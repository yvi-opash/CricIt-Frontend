<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist, Ultra-Premium Radar/Ball Icon (Light Version) -->
  <g transform="translate(30, 20) rotate(15, 100, 80)">
    <!-- Outer Data Wave (Light for dark bg) -->
    <path d="M 120 10 A 70 70 0 0 0 120 150" fill="none" stroke="#fdf6ee" stroke-width="20" stroke-linecap="round"/>
    <!-- Inner Data Wave (Light for dark bg) -->
    <path d="M 120 40 A 40 40 0 0 0 120 120" fill="none" stroke="#fdf6ee" stroke-width="20" stroke-linecap="round"/>
    <!-- The Core / Cricket Ball -->
    <circle cx="130" cy="80" r="26" fill="#f97316" />
  </g>

  <!-- Typography Section -->
  <g transform="translate(210, 115)">
    <!-- Main Brand Name (White text) -->
    <text x="0" y="0" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="100" font-weight="900" fill="#fdf6ee" letter-spacing="-3">
      CRIC<tspan fill="#f97316">.</tspan>IT
    </text>
    
    <!-- Tagline (Light slate for contrast) -->
    <text x="4" y="45" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" fill="#a8a29e" letter-spacing="4.5">
      REAL-TIME CRICKET INTELLIGENCE
    </text>
  </g>
</svg>
